<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Northview Psychology — AI Receptionist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #030810;
            --surface: #0a1220;
            --surface-2: #0f1a2e;
            --blue: #2E61FE;
            --cyan: #00F0FF;
            --border: rgba(46, 97, 254, 0.15);
            --text: #ffffff;
            --text-muted: rgba(255,255,255,0.5);
            --green: #22C55E;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
        }

        /* ═══════ HEADER ═══════ */
        .chat-header {
            padding: 16px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }

        .chat-avatar {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 0 16px rgba(46, 97, 254, 0.3);
        }

        .chat-avatar svg { width: 22px; height: 22px; }

        .chat-header-info { flex: 1; }

        .chat-header-name {
            font-size: 0.92rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .chat-header-status {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 2px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-header-status span {
            font-size: 0.68rem;
            font-weight: 400;
            color: var(--green);
            letter-spacing: 0.02em;
        }

        .chat-header-badge {
            padding: 4px 10px;
            background: rgba(46, 97, 254, 0.1);
            border: 1px solid rgba(46, 97, 254, 0.25);
            border-radius: 8px;
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--cyan);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .powered-by {
            font-size: 0.58rem;
            color: var(--text-muted);
            letter-spacing: 0.03em;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .powered-by strong {
            font-weight: 700;
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ═══════ MESSAGES AREA ═══════ */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(46, 97, 254, 0.2); border-radius: 4px; }

        .msg {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: msgIn 0.3s ease;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg--bot { align-self: flex-start; }
        .msg--user { align-self: flex-end; flex-direction: row-reverse; }

        .msg-avatar {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 2px;
        }

        .msg--bot .msg-avatar {
            background: linear-gradient(135deg, var(--blue), var(--cyan));
        }

        .msg--user .msg-avatar {
            background: rgba(46, 97, 254, 0.2);
            border: 1px solid rgba(46, 97, 254, 0.3);
        }

        .msg-avatar svg { width: 15px; height: 15px; }

        .msg-bubble {
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 0.85rem;
            line-height: 1.65;
            font-weight: 400;
        }

        .msg--bot .msg-bubble {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            color: rgba(255,255,255,0.88);
        }

        .msg--user .msg-bubble {
            background: linear-gradient(135deg, var(--blue), #1a4bcc);
            border-bottom-right-radius: 4px;
            color: #fff;
        }

        /* Typing indicator */
        .typing {
            display: flex;
            gap: 4px;
            padding: 16px 20px;
        }

        .typing span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            animation: typeDot 1.4s ease-in-out infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typeDot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* Quick replies */
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0 20px 8px;
            animation: msgIn 0.4s ease;
        }

        .quick-btn {
            padding: 9px 16px;
            background: rgba(46, 97, 254, 0.08);
            border: 1px solid rgba(46, 97, 254, 0.3);
            border-radius: 20px;
            color: var(--cyan);
            font-family: 'Sora', sans-serif;
            font-size: 0.76rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .quick-btn:hover {
            background: rgba(46, 97, 254, 0.18);
            border-color: var(--cyan);
            transform: translateY(-1px);
        }

        .quick-btn:active { transform: scale(0.97); }

        /* ═══════ INPUT AREA ═══════ */
        .chat-input-area {
            padding: 16px 20px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }

        .chat-input {
            flex: 1;
            padding: 12px 18px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Sora', sans-serif;
            font-size: 0.85rem;
            font-weight: 400;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .chat-input::placeholder { color: var(--text-muted); }

        .chat-input:focus { border-color: var(--blue); }

        .chat-send {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: opacity 0.2s, transform 0.2s;
            box-shadow: 0 3px 14px rgba(46, 97, 254, 0.3);
        }

        .chat-send:hover { opacity: 0.9; transform: translateY(-1px); }
        .chat-send:active { transform: scale(0.95); }
        .chat-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .chat-send svg { width: 18px; height: 18px; }

        /* ═══════ FOOTER ═══════ */
        .chat-footer {
            padding: 10px 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .chat-footer a {
            font-size: 0.6rem;
            color: var(--text-muted);
            text-decoration: none;
            letter-spacing: 0.03em;
            transition: color 0.2s;
        }

        .chat-footer a strong {
            font-weight: 700;
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .chat-footer a:hover { color: rgba(255,255,255,0.7); }

        /* ═══════ RESPONSIVE ═══════ */
        @media (min-width: 600px) {
            body {
                align-items: center;
                justify-content: center;
                padding: 24px;
                background: var(--bg);
            }

            .chat-container {
                width: 440px;
                height: min(720px, 90vh);
                border-radius: 20px;
                border: 1px solid var(--border);
                overflow: hidden;
                display: flex;
                flex-direction: column;
                box-shadow:
                    0 0 60px rgba(46, 97, 254, 0.08),
                    0 25px 50px rgba(0,0,0,0.4);
            }

            .chat-header { border-radius: 20px 20px 0 0; }
        }

        @media (max-width: 599px) {
            .chat-container {
                width: 100%;
                height: 100%;
                display: flex;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <!-- HEADER -->
    <div class="chat-header">
        <div class="chat-avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
            </svg>
        </div>
        <div class="chat-header-info">
            <div class="chat-header-name">Northview Psychology</div>
            <div class="chat-header-status">
                <div class="status-dot"></div>
                <span>Maya is online</span>
            </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
            <div class="chat-header-badge">AI Demo</div>
            <div class="powered-by">Powered by <strong>TRIVOX AI</strong></div>
        </div>
    </div>

    <!-- MESSAGES -->
    <div class="chat-messages" id="messages"></div>

    <!-- QUICK REPLIES -->
    <div class="quick-replies" id="quickReplies"></div>

    <!-- INPUT -->
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="chatInput" placeholder="Type your message..." autocomplete="off">
        <button class="chat-send" id="sendBtn" aria-label="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
        </button>
    </div>

    <!-- FOOTER -->
    <div class="chat-footer">
        <a href="https://trivox.ca" target="_blank">Built by <strong>TRIVOX AI</strong> — AI Automation Agency</a>
    </div>
</div>

<script>
    const messagesEl = document.getElementById('messages');
    const quickRepliesEl = document.getElementById('quickReplies');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');

    let isTyping = false;
    let bookingState = null; // null, 'asked_name', 'asked_time'
    let userName = '';

    const BOT_AVATAR = `<div class="msg-avatar"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></div>`;
    const USER_AVATAR = `<div class="msg-avatar"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>`;

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `msg msg--${sender}`;
        const avatar = sender === 'bot' ? BOT_AVATAR : USER_AVATAR;
        div.innerHTML = `${avatar}<div class="msg-bubble">${text}</div>`;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
        const div = document.createElement('div');
        div.className = 'msg msg--bot';
        div.id = 'typingIndicator';
        div.innerHTML = `${BOT_AVATAR}<div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() {
        const el = document.getElementById('typingIndicator');
        if (el) el.remove();
    }

    function hideQuickReplies() {
        quickRepliesEl.innerHTML = '';
    }

    function showQuickReplies(options) {
        quickRepliesEl.innerHTML = options.map(o =>
            `<button class="quick-btn">${o}</button>`
        ).join('');
        quickRepliesEl.querySelectorAll('.quick-btn').forEach(btn => {
            btn.addEventListener('click', () => sendMessage(btn.textContent));
        });
    }

    // ─── Smart Response Engine ───
    function getReply(input) {
        const msg = input.toLowerCase().trim();

        // Booking flow states
        if (bookingState === 'asked_name') {
            userName = input.trim();
            bookingState = 'asked_time';
            return { text: `Great to meet you, ${userName}! What day and time works best for you? We have availability Monday through Friday, 9am to 6pm.`, followUp: ['Morning this week', 'Afternoon this week', 'Next Monday'] };
        }

        if (bookingState === 'asked_time') {
            bookingState = null;
            return { text: `Perfect — I've noted your preference for ${input.trim()}. Our team will reach out to ${userName} shortly to confirm your appointment. You'll receive a confirmation email within the hour. Is there anything else I can help with?`, followUp: ['What should I expect?', 'Where are you located?', "That's all, thanks!"] };
        }

        // Crisis detection
        if (msg.match(/\b(suicid|kill myself|end it|don'?t want to live|harm myself|self.?harm|crisis)\b/i)) {
            return { text: "I hear you, and I want you to know that you're not alone. If you're in crisis or having thoughts of self-harm, please reach out to the 988 Suicide & Crisis Lifeline — call or text <strong>988</strong>. They're available 24/7 and ready to help. Our clinical team is also here for you when you're ready." };
        }

        // Book appointment
        if (msg.match(/\b(book|appointment|schedule|see someone|come in|visit|consultation)\b/)) {
            bookingState = 'asked_name';
            return { text: "I'd love to help you book an appointment! Our earliest availability is usually within the week. Could I get your name to get started?" };
        }

        // Services
        if (msg.match(/\b(service|offer|provide|what do you|help with|specializ|treat)\b/)) {
            return { text: "At Northview Psychology, we offer a range of services tailored to your needs:<br><br>• <strong>Individual Therapy</strong> — anxiety, depression, trauma, life transitions<br>• <strong>Couples Counseling</strong> — communication, conflict resolution, intimacy<br>• <strong>Psychological Assessments</strong> — ADHD, learning disabilities, diagnostic evaluations<br>• <strong>Neuropsychological Evaluations</strong> — memory, cognition, brain health<br><br>Would you like to book a session for any of these?", followUp: ['Book an appointment', 'Tell me about therapy', 'How much does it cost?'] };
        }

        // Insurance
        if (msg.match(/\b(insurance|cover|cost|price|fee|pay|afford|accept|ohip|benefit)\b/)) {
            return { text: "We accept most major insurance providers, and our sessions are covered under registered psychologist benefits. A standard individual therapy session is $200, and we offer a free 15-minute consultation call so you can find the right fit. We can also provide superbills for out-of-network reimbursement.", followUp: ['Book a free consultation', 'What services do you offer?'] };
        }

        // Talk to someone / urgent
        if (msg.match(/\b(talk|speak|someone|urgent|now|today|asap|right away|immediate)\b/)) {
            return { text: "I understand you'd like to speak with someone soon. Our next available appointment is typically within 1-2 business days. If this is urgent but not a crisis, I can flag your request as priority. Would you like me to set that up?", followUp: ['Yes, book me in', 'Tell me more about your services'] };
        }

        // Anxiety / depression
        if (msg.match(/\b(anxi|depress|stress|overwhelm|panic|worry|sad|burnout|lonely)\b/)) {
            return { text: "I'm really glad you're reaching out — that takes courage. Our therapists specialize in anxiety and depression treatment using evidence-based approaches like CBT and DBT. Many clients start feeling a difference within just a few sessions. Would you like to book an initial consultation?", followUp: ['Book an appointment', 'What is CBT?', 'How long is treatment?'] };
        }

        // Couples
        if (msg.match(/\b(couple|relationship|partner|marriage|spouse|together)\b/)) {
            return { text: "Our couples counseling program helps partners improve communication, resolve conflicts, and rebuild connection. Sessions are 60-90 minutes and our therapists use the Gottman Method and Emotionally Focused Therapy (EFT). Would you like to schedule a session for you and your partner?", followUp: ['Book for us', 'How much does it cost?'] };
        }

        // Assessment / ADHD
        if (msg.match(/\b(assess|adhd|evaluation|diagnos|testing|neuropsych|learning dis)\b/)) {
            return { text: "We provide comprehensive psychological and neuropsychological assessments for ADHD, learning disabilities, autism spectrum, and cognitive functioning. The process typically includes an intake interview, standardized testing, and a detailed report with recommendations. Assessments start at $2,500.", followUp: ['Book an assessment', 'Do you accept insurance?'] };
        }

        // Location / hours
        if (msg.match(/\b(where|location|address|office|hour|open|close|direction)\b/)) {
            return { text: "We're located at <strong>320 Danforth Ave, Suite 210, Toronto ON</strong>. Our office hours are Monday to Friday, 9am to 6pm, with evening appointments available on Tuesdays and Thursdays. We also offer virtual sessions for your convenience.", followUp: ['Book an appointment', 'Do you offer virtual sessions?'] };
        }

        // Virtual / online
        if (msg.match(/\b(virtual|online|remote|telehealth|video|zoom|phone)\b/)) {
            return { text: "Yes! We offer secure video sessions through our PHIPA-compliant telehealth platform. Virtual sessions are just as effective as in-person for most services and are available across Ontario. Same pricing applies.", followUp: ['Book a virtual session', 'What services do you offer?'] };
        }

        // What to expect
        if (msg.match(/\b(expect|first session|first time|how does|what happen|prepare)\b/)) {
            return { text: "Your first session is all about getting to know you. Your therapist will ask about your background, what brings you in, and what you'd like to work on — no pressure, at your own pace. Sessions are 50 minutes, and together you'll create a personalized treatment plan.", followUp: ['Book an appointment', 'How long is treatment?'] };
        }

        // How long / duration
        if (msg.match(/\b(how long|duration|how many session|timeline|weeks|months)\b/)) {
            return { text: "It depends on your goals and what you're working through. Some clients see meaningful progress in 6-8 sessions, while others benefit from longer-term support. Your therapist will check in regularly and adjust the plan with you.", followUp: ['Book an appointment', 'What services do you offer?'] };
        }

        // CBT
        if (msg.match(/\b(cbt|cognitive behav|what is cbt|therapy type|approach|method)\b/)) {
            return { text: "CBT (Cognitive Behavioral Therapy) is one of the most effective, research-backed treatments for anxiety and depression. It helps you identify and change negative thought patterns that affect your emotions and behavior. Most clients learn practical skills they can use for life.", followUp: ['Book an appointment', 'Tell me about other services'] };
        }

        // Thanks / goodbye
        if (msg.match(/\b(thank|thanks|bye|goodbye|that'?s all|that's it|no more|have a good)\b/)) {
            return { text: "You're welcome! Remember, Northview Psychology is here whenever you need us. Don't hesitate to reach out anytime. Wishing you all the best! 💙", followUp: ['Book an appointment', 'Visit website'] };
        }

        // Hello / greeting
        if (msg.match(/\b(hi|hello|hey|good morning|good afternoon|good evening|sup|yo)\b/)) {
            return { text: "Hey there! Welcome to Northview Psychology. I'm Maya, your virtual receptionist. I can help you learn about our services, answer questions, or get you booked for an appointment. What would you like to know?", followUp: ['What services do you offer?', 'Book an appointment', 'Do you accept insurance?'] };
        }

        // Default / fallback
        return { text: "That's a great question! I want to make sure you get the most accurate answer. For anything specific, I'd recommend a quick free consultation with our team — they can address all your questions in detail. Would you like me to set that up?", followUp: ['Yes, book a consultation', 'What services do you offer?', 'Where are you located?'] };
    }

    async function sendMessage(text) {
        if (isTyping || !text.trim()) return;

        hideQuickReplies();
        addMessage(text, 'user');

        chatInput.value = '';
        isTyping = true;
        sendBtn.disabled = true;
        showTyping();

        // Simulate natural typing delay (800-1800ms)
        const delay = 800 + Math.random() * 1000;

        setTimeout(() => {
            removeTyping();
            const response = getReply(text);
            addMessage(response.text, 'bot');

            if (response.followUp) {
                setTimeout(() => showQuickReplies(response.followUp), 300);
            }

            isTyping = false;
            sendBtn.disabled = false;
            chatInput.focus();
        }, delay);
    }

    // Event listeners
    sendBtn.addEventListener('click', () => sendMessage(chatInput.value));

    chatInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage(chatInput.value);
        }
    });

    // Initial greeting
    setTimeout(() => {
        addMessage("Hi there! I'm Maya, the virtual receptionist at Northview Psychology. How can I help you today?", 'bot');

        setTimeout(() => {
            showQuickReplies([
                'Book an appointment',
                'What services do you offer?',
                'Do you accept insurance?',
                'Talk to someone now'
            ]);
        }, 400);
    }, 600);
</script>

</body>
</html>
