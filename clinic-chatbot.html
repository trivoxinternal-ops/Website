<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Northview Psychology — AI Receptionist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #030810;
            --surface: #0a1220;
            --surface-2: #0f1a2e;
            --blue: #2E61FE;
            --cyan: #00F0FF;
            --border: rgba(46, 97, 254, 0.15);
            --text: #ffffff;
            --text-muted: rgba(255,255,255,0.5);
            --green: #22C55E;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
        }

        /* ═══════ HEADER ═══════ */
        .chat-header {
            padding: 16px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }

        .chat-avatar {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 0 16px rgba(46, 97, 254, 0.3);
        }

        .chat-avatar svg { width: 22px; height: 22px; }

        .chat-header-info { flex: 1; }

        .chat-header-name {
            font-size: 0.92rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .chat-header-status {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 2px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-header-status span {
            font-size: 0.68rem;
            font-weight: 400;
            color: var(--green);
            letter-spacing: 0.02em;
        }

        .chat-header-badge {
            padding: 4px 10px;
            background: rgba(46, 97, 254, 0.1);
            border: 1px solid rgba(46, 97, 254, 0.25);
            border-radius: 8px;
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--cyan);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .powered-by {
            font-size: 0.58rem;
            color: var(--text-muted);
            letter-spacing: 0.03em;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .powered-by strong {
            font-weight: 700;
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ═══════ MESSAGES AREA ═══════ */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(46, 97, 254, 0.2); border-radius: 4px; }

        .msg {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: msgIn 0.3s ease;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg--bot { align-self: flex-start; }
        .msg--user { align-self: flex-end; flex-direction: row-reverse; }

        .msg-avatar {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 2px;
        }

        .msg--bot .msg-avatar {
            background: linear-gradient(135deg, var(--blue), var(--cyan));
        }

        .msg--user .msg-avatar {
            background: rgba(46, 97, 254, 0.2);
            border: 1px solid rgba(46, 97, 254, 0.3);
        }

        .msg-avatar svg { width: 15px; height: 15px; }

        .msg-bubble {
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 0.85rem;
            line-height: 1.65;
            font-weight: 400;
        }

        .msg--bot .msg-bubble {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            color: rgba(255,255,255,0.88);
        }

        .msg--user .msg-bubble {
            background: linear-gradient(135deg, var(--blue), #1a4bcc);
            border-bottom-right-radius: 4px;
            color: #fff;
        }

        /* Typing indicator */
        .typing {
            display: flex;
            gap: 4px;
            padding: 16px 20px;
        }

        .typing span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            animation: typeDot 1.4s ease-in-out infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typeDot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* Quick replies */
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0 20px 8px;
            animation: msgIn 0.4s ease;
        }

        .quick-btn {
            padding: 9px 16px;
            background: rgba(46, 97, 254, 0.08);
            border: 1px solid rgba(46, 97, 254, 0.3);
            border-radius: 20px;
            color: var(--cyan);
            font-family: 'Sora', sans-serif;
            font-size: 0.76rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .quick-btn:hover {
            background: rgba(46, 97, 254, 0.18);
            border-color: var(--cyan);
            transform: translateY(-1px);
        }

        .quick-btn:active { transform: scale(0.97); }

        /* ═══════ INPUT AREA ═══════ */
        .chat-input-area {
            padding: 16px 20px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }

        .chat-input {
            flex: 1;
            padding: 12px 18px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Sora', sans-serif;
            font-size: 0.85rem;
            font-weight: 400;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .chat-input::placeholder { color: var(--text-muted); }

        .chat-input:focus { border-color: var(--blue); }

        .chat-send {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: opacity 0.2s, transform 0.2s;
            box-shadow: 0 3px 14px rgba(46, 97, 254, 0.3);
        }

        .chat-send:hover { opacity: 0.9; transform: translateY(-1px); }
        .chat-send:active { transform: scale(0.95); }
        .chat-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .chat-send svg { width: 18px; height: 18px; }

        /* ═══════ FOOTER ═══════ */
        .chat-footer {
            padding: 10px 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .chat-footer a {
            font-size: 0.6rem;
            color: var(--text-muted);
            text-decoration: none;
            letter-spacing: 0.03em;
            transition: color 0.2s;
        }

        .chat-footer a strong {
            font-weight: 700;
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .chat-footer a:hover { color: rgba(255,255,255,0.7); }

        /* ═══════ RESPONSIVE ═══════ */
        @media (min-width: 600px) {
            body {
                align-items: center;
                justify-content: center;
                padding: 24px;
                background: var(--bg);
            }

            .chat-container {
                width: 440px;
                height: min(720px, 90vh);
                border-radius: 20px;
                border: 1px solid var(--border);
                overflow: hidden;
                display: flex;
                flex-direction: column;
                box-shadow:
                    0 0 60px rgba(46, 97, 254, 0.08),
                    0 25px 50px rgba(0,0,0,0.4);
            }

            .chat-header { border-radius: 20px 20px 0 0; }
        }

        @media (max-width: 599px) {
            .chat-container {
                width: 100%;
                height: 100%;
                display: flex;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <!-- HEADER -->
    <div class="chat-header">
        <div class="chat-avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
            </svg>
        </div>
        <div class="chat-header-info">
            <div class="chat-header-name">Northview Psychology</div>
            <div class="chat-header-status">
                <div class="status-dot"></div>
                <span>Maya is online</span>
            </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
            <div class="chat-header-badge">AI Demo</div>
            <div class="powered-by">Powered by <strong>TRIVOX AI</strong></div>
        </div>
    </div>

    <!-- MESSAGES -->
    <div class="chat-messages" id="messages"></div>

    <!-- QUICK REPLIES -->
    <div class="quick-replies" id="quickReplies"></div>

    <!-- INPUT -->
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="chatInput" placeholder="Type your message..." autocomplete="off">
        <button class="chat-send" id="sendBtn" aria-label="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
        </button>
    </div>

    <!-- FOOTER -->
    <div class="chat-footer">
        <a href="https://trivox.ca" target="_blank">Built by <strong>TRIVOX AI</strong> — AI Automation Agency</a>
    </div>
</div>

<script>
    const messagesEl = document.getElementById('messages');
    const quickRepliesEl = document.getElementById('quickReplies');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');

    let isTyping = false;

    const BOT_AVATAR = `<div class="msg-avatar"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></div>`;
    const USER_AVATAR = `<div class="msg-avatar"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>`;

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `msg msg--${sender}`;
        div.innerHTML = `${sender === 'bot' ? BOT_AVATAR : USER_AVATAR}<div class="msg-bubble">${text}</div>`;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
        const div = document.createElement('div');
        div.className = 'msg msg--bot';
        div.id = 'typingIndicator';
        div.innerHTML = `${BOT_AVATAR}<div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() { const el = document.getElementById('typingIndicator'); if (el) el.remove(); }

    function hideQuickReplies() { quickRepliesEl.innerHTML = ''; }

    function showQuickReplies(options) {
        quickRepliesEl.innerHTML = options.map(o => `<button class="quick-btn">${o}</button>`).join('');
        quickRepliesEl.querySelectorAll('.quick-btn').forEach(btn => {
            btn.addEventListener('click', () => sendMessage(btn.textContent));
        });
    }

    // ═══════════════════════════════════════════════════════
    // CONVERSATION STATE MACHINE
    // Tracks context, remembers what was discussed,
    // handles multi-turn booking flows, and responds
    // contextually based on the full conversation state.
    // ═══════════════════════════════════════════════════════

    const ctx = {
        state: 'idle',          // idle | booking_name | booking_type | booking_time | booking_confirm | post_booking
        name: '',
        serviceInterest: '',
        timePreference: '',
        discussed: new Set(),   // tracks topics already covered
        turnCount: 0,
        lastTopic: '',
    };

    // Intent detection — returns the BEST intent for the message given current context
    function detectIntent(msg) {
        const m = msg.toLowerCase();

        // Crisis — always top priority
        if (/\b(suicid|kill myself|end it all|don'?t want to live|harm myself|self.?harm|crisis|emergency)\b/.test(m)) return 'crisis';

        // Context-aware: if we're in a booking flow, interpret input as booking data
        if (ctx.state === 'booking_name') return 'provide_name';
        if (ctx.state === 'booking_type') {
            // User might pick a service OR say something else
            if (/\b(individual|therapy|counseling|counsel|couples?|assessment|adhd|neuropsych|depress|anxi)\b/.test(m)) return 'provide_service';
            if (/\b(not sure|don'?t know|help me decide|recommend|which one|unsure)\b/.test(m)) return 'need_recommendation';
            return 'provide_service'; // treat free text as their concern
        }
        if (ctx.state === 'booking_time') return 'provide_time';
        if (ctx.state === 'booking_confirm') {
            if (/\b(yes|yeah|yep|sure|confirm|perfect|great|looks good|correct|that'?s right)\b/.test(m)) return 'confirm_yes';
            if (/\b(no|change|wrong|different|actually|wait)\b/.test(m)) return 'confirm_no';
            return 'confirm_yes'; // default to yes for ambiguous
        }

        // Affirmative responses (yes, sure, ok) — context-dependent
        if (/^(yes|yeah|yep|sure|ok|okay|please|absolutely|definitely|let'?s do it|go ahead|sign me up)[\s!.]*$/i.test(m)) {
            if (ctx.lastTopic === 'services') return 'book';
            if (ctx.lastTopic === 'insurance') return 'book';
            if (ctx.lastTopic === 'anxiety' || ctx.lastTopic === 'couples' || ctx.lastTopic === 'assessment') return 'book';
            if (ctx.lastTopic === 'urgent') return 'book';
            return 'book'; // default: they want to proceed
        }

        // Negative / decline
        if (/^(no|nah|not really|no thanks|i'?m good|not now|maybe later)[\s!.]*$/i.test(m)) return 'decline';

        // Booking intent
        if (/\b(book|appointment|schedule|sign up|set up|reserve|slot|opening|available|availability|when can|see a therapist|see someone)\b/.test(m)) return 'book';

        // Time/availability questions (outside booking flow)
        if (/\b(time|when|hour|morning|afternoon|evening|today|tomorrow|this week|next week|monday|tuesday|wednesday|thursday|friday|saturday|weekend)\b/.test(m)) {
            if (ctx.discussed.has('booking_started')) return 'provide_time';
            return 'availability';
        }

        // Services
        if (/\b(service|offer|provide|what do you do|help with|specializ|treat|what kind|types of)\b/.test(m)) return 'services';

        // Insurance / cost
        if (/\b(insurance|cover|cost|price|fee|pay|afford|accept|ohip|benefit|how much|expensive|rate|sliding scale)\b/.test(m)) return 'insurance';

        // Talk to someone urgently
        if (/\b(talk to someone|speak.*someone|urgent|right away|asap|immediate|need help now|can'?t wait)\b/.test(m)) return 'urgent';

        // Anxiety / depression / mental health
        if (/\b(anxi|depress|stress|overwhelm|panic|worry|sad|burnout|lonely|mental health|struggling|not okay|feeling down|can'?t cope)\b/.test(m)) return 'anxiety';

        // Couples
        if (/\b(couple|relationship|partner|marriage|spouse|wife|husband|boyfriend|girlfriend|together|fighting|communication)\b/.test(m)) return 'couples';

        // Assessment / ADHD
        if (/\b(assess|adhd|evaluation|diagnos|testing|neuropsych|learning dis|autism|asd|cognitive)\b/.test(m)) return 'assessment';

        // Location / hours
        if (/\b(where|location|address|office|directions?|find you|parking|transit)\b/.test(m)) return 'location';
        if (/\b(hours?|open|close|weekend|saturday|sunday)\b/.test(m)) return 'hours';

        // Virtual / online
        if (/\b(virtual|online|remote|telehealth|video|zoom|phone|from home)\b/.test(m)) return 'virtual';

        // What to expect
        if (/\b(expect|first session|first time|how does it work|what happen|prepare|new patient|never been)\b/.test(m)) return 'expect';

        // Duration
        if (/\b(how long|duration|how many session|timeline|weeks|months|quick fix)\b/.test(m)) return 'duration';

        // Therapy types
        if (/\b(cbt|cognitive behav|dbt|therapy type|approach|method|emdr|psychodynamic)\b/.test(m)) return 'therapy_types';

        // Therapist info
        if (/\b(therapist|psychologist|counselor|doctor|who will|qualif|credential|experience|team)\b/.test(m)) return 'therapists';

        // Thanks / goodbye
        if (/\b(thank|thanks|bye|goodbye|that'?s all|that'?s it|no more|have a good|take care)\b/.test(m)) return 'goodbye';

        // Greetings
        if (/^(hi|hello|hey|good morning|good afternoon|good evening|sup|yo|hola)[\s!.]*$/i.test(m)) return 'greeting';

        // How are you / small talk
        if (/\b(how are you|what'?s up|how'?s it going)\b/.test(m)) return 'smalltalk';

        // Catch questions about the bot
        if (/\b(are you real|are you a bot|are you ai|human|real person|are you a person)\b/.test(m)) return 'about_bot';

        return 'unknown';
    }

    // Generate response based on intent + conversation context
    function getReply(input) {
        const intent = detectIntent(input);
        ctx.turnCount++;

        let text = '';
        let quickReplies = null;

        switch (intent) {

        case 'crisis':
            text = "I hear you, and I want you to know that you're not alone. Please reach out to the <strong>988 Suicide & Crisis Lifeline</strong> — call or text <strong>988</strong>, available 24/7. If you're in immediate danger, call 911. Our clinical team is also here for you whenever you're ready to talk.";
            quickReplies = ['I want to book a session', 'Tell me about your services'];
            break;

        case 'greeting':
            text = "Hey there! Welcome to Northview Psychology. I'm Maya, your virtual receptionist. I can help you learn about our services, answer your questions, or get you set up with an appointment. What brings you in today?";
            quickReplies = ['I want to book a session', 'What services do you offer?', 'How much does it cost?', 'I need to talk to someone'];
            break;

        case 'smalltalk':
            text = "I'm doing great, thanks for asking! More importantly — how can I help you today? Whether you have questions about our clinic or want to set something up, I'm here for you.";
            quickReplies = ['I want to book a session', 'What services do you offer?'];
            break;

        case 'about_bot':
            text = "I'm Maya, an AI receptionist powered by TRIVOX AI. I'm here to help you navigate Northview Psychology's services, answer your questions, and get you started with booking. For clinical questions, our licensed psychologists will be your go-to!";
            quickReplies = ['Book an appointment', 'What services do you offer?'];
            break;

        case 'book':
            ctx.state = 'booking_name';
            ctx.discussed.add('booking_started');
            ctx.lastTopic = 'booking';
            text = "I'd love to help you book a session! Let's get you set up. First — what's your name?";
            break;

        case 'provide_name':
            ctx.name = input.trim().replace(/^(my name is |i'm |i am |it's |call me )/i, '').replace(/[.!]$/, '').trim();
            // Capitalize first letter of each word
            ctx.name = ctx.name.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
            ctx.state = 'booking_type';
            text = `Nice to meet you, ${ctx.name}! What are you looking to come in for? For example: individual therapy, couples counseling, a psychological assessment — or if you're not sure, just tell me what you're going through and I'll point you in the right direction.`;
            quickReplies = ['Individual therapy', 'Couples counseling', 'Psychological assessment', "I'm not sure yet"];
            break;

        case 'provide_service':
            ctx.serviceInterest = input.trim();
            ctx.state = 'booking_time';
            // Map to proper service name
            const m = input.toLowerCase();
            let service = ctx.serviceInterest;
            if (/individual|therapy|depress|anxi|stress|trauma/.test(m)) service = 'Individual Therapy';
            else if (/couple|relationship|partner|marriage/.test(m)) service = 'Couples Counseling';
            else if (/assess|adhd|neuropsych|testing|diagnos|autism/.test(m)) service = 'Psychological Assessment';
            else service = 'Individual Therapy'; // default
            ctx.serviceInterest = service;
            text = `Great — I'll set you up for <strong>${service}</strong>. What day and time work best for you, ${ctx.name}? We have availability Monday to Friday, 9am–6pm, with evening spots on Tuesdays and Thursdays. We also do virtual sessions if you prefer.`;
            quickReplies = ['Tomorrow morning', 'This Thursday evening', 'Next Monday afternoon', 'Virtual session please'];
            break;

        case 'need_recommendation':
            ctx.state = 'booking_type';
            text = `No worries at all, ${ctx.name} — that's completely normal. Can you tell me a little about what's been going on? For example, are you dealing with stress or anxiety, relationship challenges, difficulty focusing, or something else? That'll help me point you to the right service.`;
            break;

        case 'provide_time':
            ctx.timePreference = input.trim();
            ctx.state = 'booking_confirm';
            const virtual = /virtual|online|video|remote|from home/.test(input.toLowerCase()) ? ' (Virtual)' : ' (In-Person)';
            text = `Perfect, let me confirm your booking details:<br><br>
                <strong>Name:</strong> ${ctx.name}<br>
                <strong>Service:</strong> ${ctx.serviceInterest}<br>
                <strong>Preferred Time:</strong> ${ctx.timePreference}${virtual}<br>
                <strong>Location:</strong> 320 Danforth Ave, Suite 210, Toronto<br><br>
                Does everything look correct?`;
            quickReplies = ['Yes, confirm my booking', 'I need to change something'];
            break;

        case 'confirm_yes':
            ctx.state = 'post_booking';
            text = `You're all set, ${ctx.name}! 🎉 Our team will reach out within the next few hours to finalize your <strong>${ctx.serviceInterest}</strong> appointment. You'll get a confirmation email with all the details, intake forms, and what to expect for your first visit. Is there anything else I can help you with?`;
            quickReplies = ['What should I expect at my first session?', 'Do you accept insurance?', "That's all, thank you!"];
            ctx.discussed.add('booked');
            break;

        case 'confirm_no':
            ctx.state = 'booking_type';
            text = `No problem! Let's fix that. What would you like to change — the service type, or the day and time?`;
            quickReplies = ['Change the service', 'Change the time'];
            break;

        case 'availability':
            ctx.lastTopic = 'availability';
            text = `We have appointments available Monday through Friday, 9am to 6pm. Tuesdays and Thursdays we offer extended evening hours until 8pm. Most new patients can get in within 3-5 business days. Would you like to book a specific time?`;
            quickReplies = ['Yes, book me in', 'Do you offer virtual sessions?'];
            break;

        case 'services':
            ctx.lastTopic = 'services';
            ctx.discussed.add('services');
            text = `Here's what we offer at Northview Psychology:<br><br>
                🧠 <strong>Individual Therapy</strong> — anxiety, depression, trauma, life transitions, burnout<br>
                💑 <strong>Couples Counseling</strong> — communication, conflict, intimacy, pre-marital<br>
                📋 <strong>Psychological Assessments</strong> — ADHD, learning disabilities, diagnostic evals<br>
                🔬 <strong>Neuropsychological Evaluations</strong> — memory, cognition, brain injury<br><br>
                All sessions are available in-person or virtually. Which one sounds like what you're looking for?`;
            quickReplies = ['Individual therapy', 'Couples counseling', 'Assessments', 'How much does it cost?'];
            break;

        case 'insurance':
            ctx.lastTopic = 'insurance';
            ctx.discussed.add('insurance');
            text = `Great question! Here's a quick breakdown:<br><br>
                <strong>Individual Therapy:</strong> $200/session (50 min)<br>
                <strong>Couples Counseling:</strong> $250/session (75 min)<br>
                <strong>Assessments:</strong> starting at $2,500<br><br>
                We accept most major insurance plans, and sessions are covered under <strong>registered psychologist benefits</strong>. We also offer a <strong>free 15-minute consultation</strong> so you can meet your therapist first. Would you like to book one?`;
            quickReplies = ['Book a free consultation', 'What services do you offer?', 'Do you offer virtual?'];
            break;

        case 'urgent':
            ctx.lastTopic = 'urgent';
            text = `I understand you need to speak with someone soon, and I want to make sure you get the support you need. Our next available appointment is typically within 1-2 business days, and I can flag your request as <strong>priority</strong>. If this is a mental health emergency, please call 988 or go to your nearest emergency room. Would you like me to set up a priority appointment?`;
            quickReplies = ['Yes, priority appointment please', 'Tell me more about your services'];
            break;

        case 'anxiety':
            ctx.lastTopic = 'anxiety';
            ctx.discussed.add('anxiety');
            text = `I'm really glad you're reaching out — it takes strength to take that first step. Our therapists specialize in anxiety and depression treatment using proven approaches like <strong>CBT</strong> (Cognitive Behavioral Therapy) and <strong>DBT</strong> (Dialectical Behavior Therapy). Many clients notice meaningful progress within 6-8 sessions. Would you like to book an initial session?`;
            quickReplies = ['Yes, book a session', 'How much does it cost?', 'What is CBT?'];
            break;

        case 'couples':
            ctx.lastTopic = 'couples';
            ctx.discussed.add('couples');
            text = `Our couples counseling program helps partners strengthen communication, work through conflict, and rebuild trust. Sessions are 75 minutes, and our therapists use the <strong>Gottman Method</strong> and <strong>Emotionally Focused Therapy (EFT)</strong> — both backed by decades of research. Would you like to schedule a session for you and your partner?`;
            quickReplies = ['Book for us', 'How much is it?', 'Do you offer virtual?'];
            break;

        case 'assessment':
            ctx.lastTopic = 'assessment';
            ctx.discussed.add('assessment');
            text = `We provide comprehensive assessments for <strong>ADHD</strong>, learning disabilities, autism spectrum, and cognitive functioning. The process includes an intake interview, standardized testing across 1-2 sessions, and a detailed report with recommendations you can share with schools, employers, or doctors. Assessments start at $2,500. Want me to get you started?`;
            quickReplies = ['Book an assessment', 'Do you accept insurance?', 'How long does it take?'];
            break;

        case 'location':
            ctx.lastTopic = 'location';
            ctx.discussed.add('location');
            text = `We're located at <strong>320 Danforth Ave, Suite 210, Toronto ON</strong>, right near Broadview station. Street parking is available, and there's a Green P lot one block east. The building has elevator access and is fully wheelchair accessible.`;
            quickReplies = ['What are your hours?', 'Book an appointment', 'Do you offer virtual?'];
            break;

        case 'hours':
            ctx.lastTopic = 'hours';
            text = `Our hours are:<br><br>
                <strong>Monday–Friday:</strong> 9:00am – 6:00pm<br>
                <strong>Tues & Thurs:</strong> Extended until 8:00pm<br>
                <strong>Weekends:</strong> Closed (virtual sessions by request)<br><br>
                Would you like to book a session?`;
            quickReplies = ['Book an appointment', 'Where are you located?'];
            break;

        case 'virtual':
            ctx.lastTopic = 'virtual';
            ctx.discussed.add('virtual');
            text = `Absolutely! We offer secure video sessions through our <strong>PHIPA-compliant telehealth platform</strong>. It works on any device — no app needed. Virtual therapy is just as effective as in-person for most services, and it's available for clients across Ontario. Same pricing and session lengths apply. Want to book a virtual session?`;
            quickReplies = ['Book a virtual session', 'What services do you offer?'];
            break;

        case 'expect':
            ctx.lastTopic = 'expect';
            text = `Here's what your first session looks like:<br><br>
                1️⃣ You'll fill out a brief intake form beforehand (emailed to you)<br>
                2️⃣ Your therapist will spend the session getting to know you — your background, what's brought you in, and your goals<br>
                3️⃣ Together, you'll create a personalized plan for moving forward<br><br>
                There's no pressure to share more than you're comfortable with. Sessions are 50 minutes. Most clients say they feel relieved just after the first one.`;
            quickReplies = ctx.discussed.has('booked') ? ["That's helpful, thanks!", 'How long is treatment usually?'] : ['Book my first session', 'How much does it cost?'];
            break;

        case 'duration':
            ctx.lastTopic = 'duration';
            text = `It really depends on your needs and goals. Here's a general guide:<br><br>
                <strong>Short-term (6-12 sessions):</strong> Specific issues like anxiety, stress, adjustment<br>
                <strong>Medium-term (3-6 months):</strong> Depression, relationship issues, trauma processing<br>
                <strong>Ongoing:</strong> Complex concerns, personal growth, long-term support<br><br>
                Your therapist will check in with you regularly and adjust the plan. There's never any pressure to commit to a set number of sessions.`;
            quickReplies = ['Book an appointment', 'What services do you offer?'];
            break;

        case 'therapy_types':
            ctx.lastTopic = 'therapy_types';
            text = `Our team uses several evidence-based approaches, matched to your specific needs:<br><br>
                <strong>CBT</strong> — Identifies and changes negative thought patterns. Great for anxiety and depression.<br>
                <strong>DBT</strong> — Builds emotional regulation skills. Effective for intense emotions and self-harm.<br>
                <strong>EFT</strong> — Strengthens emotional bonds. Primarily used in couples therapy.<br>
                <strong>EMDR</strong> — Processes traumatic memories. Highly effective for PTSD.<br><br>
                Your therapist will discuss the best fit during your first session.`;
            quickReplies = ['Book an appointment', 'Tell me about your therapists'];
            break;

        case 'therapists':
            ctx.lastTopic = 'therapists';
            text = `Our team includes licensed <strong>Clinical Psychologists (Ph.D. & Psy.D.)</strong> and <strong>Registered Psychotherapists</strong>, all with 5+ years of clinical experience. Each therapist has specialized training in their areas of focus. During booking, we'll match you with the best fit based on your needs and preferences.`;
            quickReplies = ['Book an appointment', 'What services do you offer?'];
            break;

        case 'goodbye':
            ctx.state = 'idle';
            const name = ctx.name ? `, ${ctx.name}` : '';
            text = `You're very welcome${name}! Don't hesitate to come back anytime you have questions. Northview Psychology is here for you. Take care! 💙`;
            break;

        case 'decline':
            text = `No worries at all! If you change your mind or have any other questions down the line, I'm always here. Is there anything else you'd like to know about the clinic?`;
            quickReplies = ['What services do you offer?', 'Where are you located?', "No, I'm good"];
            break;

        default:
            // Contextual fallback — connect to last topic or booking
            if (ctx.discussed.has('booking_started') && !ctx.discussed.has('booked')) {
                text = `I want to make sure I help you properly. Were you looking to continue with the booking, or did you have a different question? I'm happy to help either way.`;
                quickReplies = ['Continue booking', 'I have a question'];
            } else {
                text = `I appreciate you asking! That's a bit outside what I can cover in detail, but our team would be happy to answer that during a free 15-minute consultation. Want me to set one up? Or I can help with info about our services, pricing, or booking.`;
                quickReplies = ['Book a free consultation', 'What services do you offer?', 'How much does it cost?'];
            }
            break;
        }

        ctx.lastTopic = ctx.lastTopic || intent;
        return { text, quickReplies };
    }

    async function sendMessage(text) {
        if (isTyping || !text.trim()) return;

        hideQuickReplies();
        addMessage(text, 'user');
        chatInput.value = '';
        isTyping = true;
        sendBtn.disabled = true;
        showTyping();

        // Typing delay scales with response length (feels natural)
        const response = getReply(text);
        const baseDelay = 600;
        const charDelay = Math.min(response.text.length * 3, 1400);
        const delay = baseDelay + charDelay * (0.5 + Math.random() * 0.5);

        setTimeout(() => {
            removeTyping();
            addMessage(response.text, 'bot');
            if (response.quickReplies) {
                setTimeout(() => showQuickReplies(response.quickReplies), 300);
            }
            isTyping = false;
            sendBtn.disabled = false;
            chatInput.focus();
        }, delay);
    }

    sendBtn.addEventListener('click', () => sendMessage(chatInput.value));
    chatInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(chatInput.value); }
    });

    // Initial greeting
    setTimeout(() => {
        addMessage("Hi there! I'm <strong>Maya</strong>, the virtual receptionist at Northview Psychology. I can help you learn about our services, answer questions about the clinic, or get you started with booking an appointment. What brings you in today?", 'bot');
        setTimeout(() => {
            showQuickReplies(['Book an appointment', 'What services do you offer?', 'How much does it cost?', 'I need to talk to someone']);
        }, 400);
    }, 600);
</script>
