<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Northview Psychology — AI Receptionist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #030810;
            --surface: #0a1220;
            --surface-2: #0f1a2e;
            --blue: #2E61FE;
            --cyan: #00F0FF;
            --border: rgba(46, 97, 254, 0.15);
            --text: #ffffff;
            --text-muted: rgba(255,255,255,0.5);
            --green: #22C55E;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
        }

        /* ═══════ HEADER ═══════ */
        .chat-header {
            padding: 16px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }

        .chat-avatar {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 0 16px rgba(46, 97, 254, 0.3);
        }

        .chat-avatar svg { width: 22px; height: 22px; }

        .chat-header-info { flex: 1; }

        .chat-header-name {
            font-size: 0.92rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .chat-header-status {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 2px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-header-status span {
            font-size: 0.68rem;
            font-weight: 400;
            color: var(--green);
            letter-spacing: 0.02em;
        }

        .chat-header-badge {
            padding: 4px 10px;
            background: rgba(46, 97, 254, 0.1);
            border: 1px solid rgba(46, 97, 254, 0.25);
            border-radius: 8px;
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--cyan);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .powered-by {
            font-size: 0.58rem;
            color: var(--text-muted);
            letter-spacing: 0.03em;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .powered-by strong {
            font-weight: 700;
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ═══════ MESSAGES AREA ═══════ */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(46, 97, 254, 0.2); border-radius: 4px; }

        .msg {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: msgIn 0.3s ease;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg--bot { align-self: flex-start; }
        .msg--user { align-self: flex-end; flex-direction: row-reverse; }

        .msg-avatar {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 2px;
        }

        .msg--bot .msg-avatar {
            background: linear-gradient(135deg, var(--blue), var(--cyan));
        }

        .msg--user .msg-avatar {
            background: rgba(46, 97, 254, 0.2);
            border: 1px solid rgba(46, 97, 254, 0.3);
        }

        .msg-avatar svg { width: 15px; height: 15px; }

        .msg-bubble {
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 0.85rem;
            line-height: 1.65;
            font-weight: 400;
        }

        .msg--bot .msg-bubble {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            color: rgba(255,255,255,0.88);
        }

        .msg--user .msg-bubble {
            background: linear-gradient(135deg, var(--blue), #1a4bcc);
            border-bottom-right-radius: 4px;
            color: #fff;
        }

        /* Typing indicator */
        .typing {
            display: flex;
            gap: 4px;
            padding: 16px 20px;
        }

        .typing span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            animation: typeDot 1.4s ease-in-out infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typeDot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* Quick replies */
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0 20px 8px;
            animation: msgIn 0.4s ease;
        }

        .quick-btn {
            padding: 9px 16px;
            background: rgba(46, 97, 254, 0.08);
            border: 1px solid rgba(46, 97, 254, 0.3);
            border-radius: 20px;
            color: var(--cyan);
            font-family: 'Sora', sans-serif;
            font-size: 0.76rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .quick-btn:hover {
            background: rgba(46, 97, 254, 0.18);
            border-color: var(--cyan);
            transform: translateY(-1px);
        }

        .quick-btn:active { transform: scale(0.97); }

        /* ═══════ INPUT AREA ═══════ */
        .chat-input-area {
            padding: 16px 20px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }

        .chat-input {
            flex: 1;
            padding: 12px 18px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Sora', sans-serif;
            font-size: 0.85rem;
            font-weight: 400;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .chat-input::placeholder { color: var(--text-muted); }

        .chat-input:focus { border-color: var(--blue); }

        .chat-send {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: opacity 0.2s, transform 0.2s;
            box-shadow: 0 3px 14px rgba(46, 97, 254, 0.3);
        }

        .chat-send:hover { opacity: 0.9; transform: translateY(-1px); }
        .chat-send:active { transform: scale(0.95); }
        .chat-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .chat-send svg { width: 18px; height: 18px; }

        /* ═══════ FOOTER ═══════ */
        .chat-footer {
            padding: 10px 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .chat-footer a {
            font-size: 0.6rem;
            color: var(--text-muted);
            text-decoration: none;
            letter-spacing: 0.03em;
            transition: color 0.2s;
        }

        .chat-footer a strong {
            font-weight: 700;
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .chat-footer a:hover { color: rgba(255,255,255,0.7); }

        /* ═══════ RESPONSIVE ═══════ */
        @media (min-width: 600px) {
            body {
                align-items: center;
                justify-content: center;
                padding: 24px;
                background: var(--bg);
            }

            .chat-container {
                width: 440px;
                height: min(720px, 90vh);
                border-radius: 20px;
                border: 1px solid var(--border);
                overflow: hidden;
                display: flex;
                flex-direction: column;
                box-shadow:
                    0 0 60px rgba(46, 97, 254, 0.08),
                    0 25px 50px rgba(0,0,0,0.4);
            }

            .chat-header { border-radius: 20px 20px 0 0; }
        }

        @media (max-width: 599px) {
            .chat-container {
                width: 100%;
                height: 100%;
                display: flex;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <!-- HEADER -->
    <div class="chat-header">
        <div class="chat-avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
            </svg>
        </div>
        <div class="chat-header-info">
            <div class="chat-header-name">Northview Psychology</div>
            <div class="chat-header-status">
                <div class="status-dot"></div>
                <span>Maya is online</span>
            </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
            <div class="chat-header-badge">AI Demo</div>
            <div class="powered-by">Powered by <strong>TRIVOX AI</strong></div>
        </div>
    </div>

    <!-- MESSAGES -->
    <div class="chat-messages" id="messages"></div>

    <!-- QUICK REPLIES -->
    <div class="quick-replies" id="quickReplies"></div>

    <!-- INPUT -->
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="chatInput" placeholder="Type your message..." autocomplete="off">
        <button class="chat-send" id="sendBtn" aria-label="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
        </button>
    </div>

    <!-- FOOTER -->
    <div class="chat-footer">
        <a href="https://trivox.ca" target="_blank">Built by <strong>TRIVOX AI</strong> — AI Automation Agency</a>
    </div>
</div>

<script>
    const SYSTEM_PROMPT = `You are Maya, a friendly and professional AI receptionist for Northview Psychology, a psychological clinic in Toronto. Your job is to answer questions about the clinic, help users understand what services are available, and guide interested users toward booking an appointment. Services include: individual therapy, couples counseling, psychological assessments, anxiety & depression treatment, and neuropsychological evaluations. Be warm, concise, and empathetic. Never diagnose. If someone seems in crisis, compassionately refer them to 988 (crisis line). When a user wants to book, tell them you can connect them with the team and ask for their name and preferred time. Keep responses short — max 3 sentences.`;

    const messagesEl = document.getElementById('messages');
    const quickRepliesEl = document.getElementById('quickReplies');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');

    let conversationHistory = [];
    let isTyping = false;

    const BOT_AVATAR = `<div class="msg-avatar"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></div>`;
    const USER_AVATAR = `<div class="msg-avatar"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>`;

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `msg msg--${sender}`;
        const avatar = sender === 'bot' ? BOT_AVATAR : USER_AVATAR;
        div.innerHTML = `${avatar}<div class="msg-bubble">${text}</div>`;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
        const div = document.createElement('div');
        div.className = 'msg msg--bot';
        div.id = 'typingIndicator';
        div.innerHTML = `${BOT_AVATAR}<div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() {
        const el = document.getElementById('typingIndicator');
        if (el) el.remove();
    }

    function hideQuickReplies() {
        quickRepliesEl.innerHTML = '';
    }

    function showQuickReplies(options) {
        quickRepliesEl.innerHTML = options.map(o =>
            `<button class="quick-btn">${o}</button>`
        ).join('');

        quickRepliesEl.querySelectorAll('.quick-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                sendMessage(btn.textContent);
            });
        });
    }

    async function sendToAPI(messages) {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'x-api-key': '',
                'anthropic-version': '2023-06-01',
                'anthropic-dangerous-direct-browser-access': 'true'
            },
            body: JSON.stringify({
                model: 'claude-sonnet-4-20250514',
                max_tokens: 1000,
                system: SYSTEM_PROMPT,
                messages: messages
            })
        });

        if (!response.ok) {
            throw new Error('API request failed');
        }

        const data = await response.json();
        return data.content[0].text;
    }

    async function sendMessage(text) {
        if (isTyping || !text.trim()) return;

        hideQuickReplies();
        addMessage(text, 'user');
        conversationHistory.push({ role: 'user', content: text });

        chatInput.value = '';
        isTyping = true;
        sendBtn.disabled = true;
        showTyping();

        try {
            const reply = await sendToAPI(conversationHistory);
            removeTyping();
            addMessage(reply, 'bot');
            conversationHistory.push({ role: 'assistant', content: reply });
        } catch (err) {
            removeTyping();
            addMessage("I'm sorry, I'm having trouble connecting right now. Please call us directly at (416) 555-0192 and our team will be happy to help.", 'bot');
        }

        isTyping = false;
        sendBtn.disabled = false;
        chatInput.focus();
    }

    // Event listeners
    sendBtn.addEventListener('click', () => sendMessage(chatInput.value));

    chatInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage(chatInput.value);
        }
    });

    // Initial greeting
    setTimeout(() => {
        addMessage("Hi there! I'm Maya, the virtual receptionist at Northview Psychology. How can I help you today?", 'bot');

        setTimeout(() => {
            showQuickReplies([
                'Book an appointment',
                'What services do you offer?',
                'Do you accept insurance?',
                'Talk to someone now'
            ]);
        }, 400);
    }, 600);
</script>

</body>
</html>
